<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Smart Works Solutions</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#f4f6fb; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

        #loader {
            position:absolute; inset:0;
            background:#f4f6fb;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            z-index:5; gap:16px; transition:opacity .4s;
        }
        .spinner {
            width:48px; height:48px;
            border:4px solid #e2e8f0;
            border-top-color:#4361ee;
            border-radius:50%;
            animation:spin .8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loader p { color:#5a607a; font-family:sans-serif; font-size:14px; }

        #app-frame { flex:1; width:100%; height:100vh; border:none; display:block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p>جارٍ تحميل التطبيق...</p>
    </div>

    <iframe
        id="app-frame"
        src="https://script.google.com/macros/s/AKfycbxs5vFNvM6Tzf9Ab0sh2L8L9K1ukwNAsplCpQlkBDZjmkPNq5qIQW5Jf9CYdUZhzjaK1A/exec"
        allow="camera; microphone; geolocation; clipboard-read; clipboard-write"
        allowfullscreen
        onload="document.getElementById('loader').style.opacity='0'; setTimeout(()=>document.getElementById('loader').style.display='none',400);"
    ></iframe>

</body>
</html>
